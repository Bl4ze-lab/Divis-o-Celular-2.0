<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Divisão Celular</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background: linear-gradient(#0f172a,#020617);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.hidden{display:none;}

.container{width:100%;max-width:400px;}

.box{
  background:#0e1425;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px #1634db;
}

button{
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#225dff;
  color:rgb(0, 0, 0);
  cursor:pointer;
  width:100%;
  transition:0.3s;
}

button:hover{transform:scale(1.05);}

.correct{background:#00ff00 !important;}
.wrong{background:#ff0000 !important;}

img{
  width: 150px;
  margin:10px;
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
}

.nav button{width:auto;}

.barra{
  height:10px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.progresso{
  height:100%;
  width:0%;
  background:#00ff00;
}


.confete{
  position:fixed;
  width:8px;
  height:8px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container">


<div id="menu">
  <h1>🧬 Divisão Celular</h1>
  <button onclick="iniciar()">▶️ Jogar</button>
  <p id="ultimo"></p>
  <h3>By: Dev Enzo (Bl4ze)</h3>
</div>


<div id="jogo" class="hidden">

<div class="barra">
  <div id="barra" class="progresso"></div>
</div>

<img id="img">

<div class="box">
  <div id="pergunta"></div>
  <div id="respostas"></div>
  <div id="feedback"></div>
  <div id="score"></div>

  <div class="nav">
    <button onclick="anterior()">⬅️ anterior</button>
    <button onclick="resetar()">🔄</button>
    <button onclick="proxima()">próxima ➡️</button>
  </div>
</div>

</div>


<div id="final" class="hidden">
  <h1>🏆 Resultado Final</h1>
  <h2 id="resultado"></h2>
  <p id="rankFinal"></p>
  <button onclick="reiniciarJogo()">🔁 Jogar novamente</button>
</div>

</div>

<audio id="acerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="erro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

let perguntas=[
{q:"1. Durante o ciclo celular, em qual subfase da interfase ocorre a replicação (duplicação) do DNA?",r:["Fase G1","Fase S","Fase G2"],c:1,img:"pergunta 1.webp"},
{q:"2. Na Mitose, qual é a fase caracterizada pelo alinhamento dos cromossomos na placa equatorial da célula?",r:["Metáfase","Anáfase","Profáse"],c:0,img:"pergunta 2.jpg"},
{q:"3. O que ocorre especificamente durante a Anáfase da Mitose?",r:["separação das cromátides irmãs","Descondensação dos cromossomos","pareamento de cromossomos homnológicos"],c:0,img:"pergunta 3.jpg"},
{q:"4. A Citocinese é o processo que finaliza a divisão celular. Qual a sua principal função?",r:["Dividir o Citoplasma e as Organelas","Dividir o núcleo em dois","Duplicar as Mitocôdrias"],c:0,img:"pergunta 4.jpg"},
{q:"5. O 'Crossing-over' é um evento fundamental para a variabilidade genética. Em qual fase da Meiose ele ocorre?",r:["Prófase I","Prófase II","Metáfase II"],c:0,img:"pergunta 5.jpg"},
{q:"6. Qual é a principal diferença entre a Anáfase I e a Anáfase II da Meiose?",r:["Na I separam-se homólogos; na II separam-se cromátides irmãs","Não há diferença, ambas separam cromátides irmãs","Na I separam-se cromátides irmãs; na II separam-se homólogos"],c:0,img:"pergunta 6.jpg"},
{q:"7. Na Metáfase II da Meiose, como os cromossomos se organizam na placa equatorial?",r:["individualmente, um sobre o outro","Em pares do Homólogo","ligadas apenas por um polo do fuso"],c:0,img:"pergunta 7.jpg"},
{q:"8. Considerando a Interfase, o que caracteriza a fase G2?",r:["Crescimento final e síntese de proteínas para a divisão","A célula para de crescer definitivamente","Ocorre a separação do citoplasma"],c:0,img:"pergunta 8.jpg"},
{q:"9. Na Meiose, a Telófase I resulta em quantas células e com qual ploidia (em relação à original)?",r:["Duas células haploides (n)","Quatro células haploides (n)","Duas células diploides (2n)"],c:0,img:"pergunta 9.jpg"},
{q:"10. Ao final de todo o processo de Meiose (I e II), qual é o saldo final de células produzidas a partir de uma célula-mãe diploide?",r:["Quatro células filhas geneticamente diferentes e haploides","Quatro células filhas diploides e clones entre si","Quatro células filhas geneticamente idênticas à mãe"],c:0,img:"pergunta 10.png"}
];

let i=0, acertos=0;
let respd=new Array(perguntas.length).fill(null);

function embaralhar(a){return a.sort(()=>Math.random()-0.5);}

function iniciar(){
  menu.classList.add("hidden");
  jogo.classList.remove("hidden");
  mostrar();
}

function mostrar(){
  let p=perguntas[i];
  let respostas=embaralhar([...p.r]);

  pergunta.innerHTML="<h3>"+p.q+"</h3>";
  img.src=p.img;

  let html="";
  respostas.forEach(r=>{
    html+=`<button onclick="responder(this,'${r}')">${r}</button>`;
  });

  respostasDiv= document.getElementById("respostas");
  respostasDiv.innerHTML=html;

  feedback.innerText="";
  p.correta=p.r[p.c];
  atualizar();
}

function responder(btn,res){
  let p=perguntas[i];

  if(respd[i]==null){
    let botoes=document.querySelectorAll("#respostas button");

    botoes.forEach(b=>b.disabled=true);

    if(res===p.correta){
      acertos++;
      acerto.play();
      btn.classList.add("correct");
      feedback.innerText="✅ Certo!";
      confete();
    }else{
      erro.play();
      btn.classList.add("wrong");
      feedback.innerText="❌ "+p.correta;

      botoes.forEach(b=>{
        if(b.innerText===p.correta){
          b.classList.add("correct");
        }
      });
    }

    respd[i]=res;
  }

  atualizar();

  if(respd.every(x=>x!=null)){
    setTimeout(finalizar,800);
  }
}

function atualizar(){
  score.innerText=`Acertos: ${acertos}/${perguntas.length}`;
  barra.style.width=(respd.filter(x=>x!=null).length/perguntas.length*100)+"%";
}

function proxima(){ if(i<perguntas.length-1){i++;mostrar();}}
function anterior(){ if(i>0){i--;mostrar();}}

function finalizar(){
  localStorage.setItem("pontuacao",acertos);
  jogo.classList.add("hidden");
  final.classList.remove("hidden");

  resultado.innerText=`${acertos}/${perguntas.length}`;

  let p=(acertos/perguntas.length)*100;
  rankFinal.innerText=
    p===100?"Meus párabens você acertou todas e tirou 🏆 S":
    p>=70?"Quase hein, acertou quase todas e tirou🥇 A":
    p>=50?"Estuda mais um pouco, você tirou 🥈 B":"Você é BURRO? tirou 🥉 C";
}

function reiniciarJogo(){
  i=0;
  acertos=0;
  respd=new Array(perguntas.length).fill(null);

  final.classList.add("hidden");
  menu.classList.remove("hidden");
}

function resetar(){
  i=0;
  acertos=0;
  respd=new Array(perguntas.length).fill(null);
  barra.style.width="0%";
  mostrar();
}

function confete(){
  for(let i=0;i<30;i++){
    let c=document.createElement("div");
    c.classList.add("confete");
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration=(Math.random()*2+1)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

let ult=localStorage.getItem("pontuacao");
if(ult) ultimo.innerText="Última: "+ult;

</script>

</body>
</html>
